name: Release
on:
  push:
    branches:
      - master
      - main

jobs:
  release:
    runs-on: ubuntu-22.04   
    if: |
      startsWith(github.event.head_commit.message, 'v') &&
      contains(github.event.head_commit.message, '.') &&
      contains(github.event.head_commit.message, '.')
    
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # This will fetch the complete history

      # Fetch all tags to determine the last release
      - name: Fetch all tags
        run: git fetch --tags --force

      # Get the list of changed files since the last tag
      - name: Generate release description
        id: changes
        run: |
          # Fetch the latest tag by commit time
          LAST_TAG=$(git tag --sort=-creatordate | head -n 1)
      
          # Check if the last tag exists before proceeding
          if [ -z "$LAST_TAG" ] || ! git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            echo "Initial release." > release_body.txt
          else
            echo "Changes since $LAST_TAG:" > release_body.txt
            echo "" >> release_body.txt
            git log "$LAST_TAG"..HEAD --pretty=format:"- %s" >> release_body.txt
            echo "" >> release_body.txt
            echo "" >> release_body.txt
            echo "" >> release_body.txt
            echo "Changed files:" >> release_body.txt
            printf '```' >> release_body.txt  # Start code block
            
            # Generate the list of changes with custom markers
            git diff --name-status "$LAST_TAG"..HEAD | sed 's/^A/[+]/;s/^M/[*]/;s/^D/[-]/;s/\t/ /g' >> release_body.txt
      
            echo "[*] assets/built/app.css" >> release_body.txt
            echo "[*] assets/built/app.js" >> release_body.txt
      
            printf '```' >> release_body.txt  # End code block
          fi

      # Set up Node.js and install dependencies
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm ci

      # Build assets
      - name: Build assets
        run: npm run build

      # Extract version and name from package.json
      - name: Get project metadata
        id: metadata
        run: |
          echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_ENV
          echo "NAME=$(jq -r '.name' package.json)" >> $GITHUB_ENV

      # Create zip archive
      - name: Create release archive
        run: |
          zip -r "${{ env.NAME }}.zip" . -x '.*' 'node_modules*' 'yarn*' 'npm*' 'dist*' 'demo*'

      # Publish release
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body_path: release_body.txt # Use the file for the release body
          files: ${{ env.NAME }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}